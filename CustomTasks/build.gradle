plugins {
    // Apply the java plugin to add support for Java
    id 'java'

    // Apply the application plugin to add support for building a CLI application
    id 'application'
}

repositories {
    // Use jcenter for resolving dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

dependencies {
    // This dependency is used by the application.
    implementation 'com.google.guava:guava:28.0-jre'

    // Use JUnit test framework
    testImplementation 'junit:junit:4.12'
}

application {
    // Define the main class for the application
    mainClassName = 'Gradle.App'
}

task newTask {
	doLast{
	println "this is my first new task"
	}
}

task dependentTask{
	dependsOn 'newTask'
	doLast{
	println "this is dependent on newTask"
	}
}

task copyTask(type : Copy){
	from 'test.txt'
	into './Test'
	}

task variableTask{
	def vr1 = 50
	def n1 = {s1, s2 ->
		println 'This is method '+ (s1+s2)
	}
	doLast{
		println "${vr1} and print here"
		n1(5,7)
	}

}

exVar.name = 'This is extraVariable property'

task exVarTask {
	doLast{

		println "Hello : ," +project.exVar.name
		println "Project name :" +project.name

		}
}
	
